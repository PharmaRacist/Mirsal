<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Mirsal</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="popup">
            <header class="header">
                <div class="logo-wrap">
                    <span class="logo">مرسـال</span>
                    <span class="logo-dot"></span>
                </div>
                <button
                    class="icon-btn"
                    id="open-settings"
                    title="Open settings"
                >
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </header>
            <div class="layer-1-card">
                <div class="site-card">
                    <div class="site-identity">
                        <div class="favicon-wrap">
                            <img
                                class="site-favicon"
                                id="site-favicon"
                                src=""
                                alt=""
                            />
                        </div>
                        <span class="site-host" id="site-host">—</span>
                    </div>
                    <div class="site-actions">
                        <button class="action-chip" id="downloads-toggle">
                            <span
                                class="material-symbols-rounded chip-icon"
                                id="downloads-icon"
                                >download</span
                            >
                        </button>
                        <button class="action-chip" id="shade-toggle">
                            <span
                                class="material-symbols-rounded chip-icon"
                                id="shade-icon"
                                >contrast</span
                            >
                        </button>
                    </div>
                </div>
                <div class="control-row">
                    <div class="row-icon-wrap">
                        <span class="material-symbols-rounded row-icon"
                            >download</span
                        >
                    </div>
                    <span class="row-label">Downloads</span>
                    <label class="toggle">
                        <input type="checkbox" id="downloads-enabled" />
                        <span class="track"></span>
                    </label>
                </div>
                <div class="control-row">
                    <div class="row-icon-wrap">
                        <span class="material-symbols-rounded row-icon"
                            >palette</span
                        >
                    </div>
                    <span class="row-label">Palette</span>
                    <label class="toggle">
                        <input type="checkbox" id="palette-enabled" />
                        <span class="track"></span>
                    </label>
                </div>
                <div class="control-row">
                    <div class="row-icon-wrap">
                        <span class="material-symbols-rounded row-icon"
                            >contrast</span
                        >
                    </div>
                    <span class="row-label">Shade</span>
                    <label class="toggle">
                        <input type="checkbox" id="shade-enabled" />
                        <span class="track"></span>
                    </label>
                </div>
            </div>
        </div>
        <script src="../../common/config_options.js"></script>
        <script src="../../common/css_colors.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
